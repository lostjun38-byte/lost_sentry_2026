local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      update_frequency: 20.0
      publish_frequency: 10.0

      plugins: ["mid360_obstacle_layer", "inflation_layer"]

      mid360_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: mid360

        mid360:
          topic: /mid360/points_deskewed
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: 0.02
          max_obstacle_height: 1.2
          obstacle_min_range: 0.05
          obstacle_max_range: 4.0
          raytrace_min_range: 0.05
          raytrace_max_range: 4.5
          observation_persistence: 0.2
          expected_update_rate: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25
        cost_scaling_factor: 5.0
