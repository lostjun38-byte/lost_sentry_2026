behavior_server:
  ros__parameters:
    use_sim_time: False
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "pb_nav2_behaviors/BackUpFreeSpace"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: gimbal_yaw_fake
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # params for pb_nav2_behaviors/BackUpFreeSpace
    service_name: "local_costmap/get_costmap"
    max_radius: 1.4
    visualize: true
    inscribed_radius: 0.3
    min_escape_distance: 0.5
    obstacle_cost_threshold: 253

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 10.0
    scale_velocities: False
    # [修改点 1] 改为闭环，让算法感知惯性
    # feedback: "CLOSED_LOOP"
    feedback: "OPEN_LOOP"
    max_velocity: [2.5, 2.5, 3.0] #[0.50, 0.0, 2.5]
    min_velocity: [-2.5, -2.5, -3.0] #[-0.50, 0.0, -2.5]
    # max_accel: [4.5, 4.5, 5.0] #[2.5, 0.0, 3.2]
    # max_decel: [-4.5, -4.5, -5.0] #[-2.5, 0.0, -3.2]
    max_accel: [5.0, 5.0, 6.0] # 确保横向(Y)和旋转(Theta)的加速度足够大，能响应急转指令
    # [修改点 2] 改为正值，并大幅增大数值 (建议 8.0 - 10.0)
    # 物理含义：允许每秒降低 8.0 m/s 的速度。
    max_decel: [-8.0, -8.0, -10.0]
    odom_topic: "odometry"
    odom_duration: 0.1
    # deadband_velocity: [0.0, 0.0, 0.0]
    # [修改点 3] 增加微小死区，小于此速度直接切断输出，利用电机阻尼停车
    deadband_velocity: [0.05, 0.05, 0.05]
    velocity_timeout: 1.0

